[agentguard_failed_spans_alert]
description = Alert when any agent span fails in the last 5 minutes
search = index=main sourcetype=agentguard:trace status=FAILED earliest=-5m | stats count as failure_count values(error_type) as error_types values(trace_id) as trace_ids by agent_name | where failure_count > 0
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
is_visible = 1
alert.track = 1
alert.severity = 3
counttype = number of events
relation = greater than
quantity = 0
action.webhook = 1
action.webhook.param.url = http://127.0.0.1:8001/api/v1/alerts/webhook/
action.webhook.param.method = post
action.webhook.param.payload_format = json

[agentguard_latency_anomaly_alert]
description = Alert on latency anomalies (requires sufficient volume)
search = index=main sourcetype=agentguard:trace earliest=-15m | timechart span=5m avg(latency_ms) as avg_latency by agent_name | anomalydetection avg_latency | where isOutlier(avg_latency)=1
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
is_visible = 1
alert.track = 1
alert.severity = 2
counttype = number of events
relation = greater than
quantity = 0
action.webhook = 1
action.webhook.param.url = http://127.0.0.1:8001/api/v1/alerts/webhook/
action.webhook.param.method = post
action.webhook.param.payload_format = json

[agentguard_high_failure_rate]
description = Alert when agent failure rate exceeds 20% in the last hour
search = index=main sourcetype=agentguard:trace earliest=-1h | stats count as total count(eval(status="FAILED" OR status="TIMEOUT")) as failures by agent_name | eval failure_rate=100*failures/total | where failure_rate > 20
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
is_visible = 1
alert.track = 1
alert.severity = 3
counttype = number of results
relation = greater than
quantity = 0
action.webhook = 1
action.webhook.param.url = http://127.0.0.1:8001/api/v1/alerts/webhook/
action.webhook.param.method = post
action.webhook.param.payload_format = json
