[agentguard_failures_15m]
description = Failed agent spans in the last 15 minutes, grouped by agent and error type
search = index=main sourcetype=agentguard:trace status=FAILED earliest=-15m | stats count by agent_name, error_type | sort -count
dispatch.earliest_time = -15m
dispatch.latest_time = now
is_visible = 1

[agentguard_latency_p95]
description = P95 latency by agent over the last hour
search = index=main sourcetype=agentguard:trace earliest=-1h | stats p95(latency_ms) as p95_latency_ms by agent_name | sort -p95_latency_ms
dispatch.earliest_time = -1h
dispatch.latest_time = now
is_visible = 1

[agentguard_error_breakdown]
description = Failure and timeout counts by error type and agent (24h)
search = index=main sourcetype=agentguard:trace (status=FAILED OR status=TIMEOUT) earliest=-24h | stats count by error_type, agent_name
dispatch.earliest_time = -24h
dispatch.latest_time = now
is_visible = 1

[agentguard_latency_anomaly]
description = Latency anomalies via built-in anomalydetection (MLTK optional upgrade)
search = index=main sourcetype=agentguard:trace earliest=-1h | timechart span=5m avg(latency_ms) as avg_latency by agent_name | anomalydetection avg_latency | where isOutlier(avg_latency)=1 | eval is_anomaly=1
dispatch.earliest_time = -1h
dispatch.latest_time = now
is_visible = 1

[agentguard_mltk_latency_density]
description = MLTK DensityFunction on latency_ms (requires Splunk_ML_Toolkit)
search = index=main sourcetype=agentguard:trace earliest=-1h | fit DensityFunction latency_ms as anomaly_score into agentguard_latency_density | apply agentguard_latency_density | eval is_anomaly=if(anomaly_score>0.75,1,0) | where is_anomaly=1
dispatch.earliest_time = -1h
dispatch.latest_time = now
is_visible = 0
